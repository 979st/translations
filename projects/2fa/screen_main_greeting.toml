[en_US]
v = "Tap the add icon in the bottom corner to add an account. You can also import accounts from other authenticator apps in Settings."

[es_ES]
v = "Toca el icono de agregar en la esquina inferior para añadir una cuenta. También puedes importar cuentas desde otras aplicaciones de autenticación en Ajustes."

[ru_RU]
v = "Нажмите на значок добавления в нижнем углу, чтобы добавить аккаунт. Вы также можете импортировать аккаунты из других приложений-аутентификаторов в Настройках."
